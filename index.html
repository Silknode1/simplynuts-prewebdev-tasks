<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simply Nuts — Task Tracker</title>
<style>
:root {
  --espresso: #24160f;
  --walnut: #6e4023;
  --copper: #b56a3b;
  --pine: #3e5f43;
  --cream: #fdf8f0;
  --snow: #fffdfa;
  --ink: #1d1612;
  --card-border: #e8d9c7;
  --forest-500: #3d8b3d;
  --forest-600: #2d6b2d;
  --wood-100: #f5e6d0;
  --wood-200: #e8c9a0;
  --wood-600: #8b5529;
  --burn: #c45e20;
  --done-bg: rgba(61,139,61,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--cream);
  color: var(--ink);
  line-height: 1.5;
  min-height: 100vh;
}

header {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 1.5rem 1rem;
}

header h1 {
  font-size: 1.4rem;
  color: var(--espresso);
  font-weight: 700;
}

header .subtitle {
  font-size: 0.85rem;
  color: var(--walnut);
  margin-top: 0.25rem;
}

.global-progress {
  margin-top: 1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.progress-bar {
  flex: 1;
  height: 8px;
  background: var(--wood-100);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--forest-500);
  border-radius: 4px;
  transition: width 0.3s ease;
  width: 0%;
}

.progress-text {
  font-size: 0.8rem;
  color: var(--walnut);
  white-space: nowrap;
  font-weight: 600;
  min-width: 90px;
  text-align: right;
}

.controls {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.75rem;
  flex-wrap: wrap;
  align-items: center;
}

.controls select, .controls button {
  font-size: 0.78rem;
  padding: 0.35rem 0.6rem;
  border: 1px solid var(--card-border);
  border-radius: 6px;
  background: var(--snow);
  color: var(--ink);
  cursor: pointer;
}

.controls button:hover {
  background: var(--wood-100);
}

main {
  max-width: 900px;
  margin: 0 auto;
  padding: 0.5rem 1.5rem 3rem;
}

/* --- Sections (collapsible) --- */
details.section {
  background: var(--snow);
  overflow: hidden;
}

details.section > summary {
  list-style: none;
  cursor: pointer;
  padding: 0.85rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  user-select: none;
  background: var(--snow);
  transition: background 0.15s;
}

details.section > summary:hover {
  background: var(--wood-100);
}

details.section > summary::-webkit-details-marker { display: none; }

.section-arrow {
  display: inline-block;
  width: 0;
  height: 0;
  border-left: 5px solid var(--walnut);
  border-top: 4px solid transparent;
  border-bottom: 4px solid transparent;
  transition: transform 0.2s;
  flex-shrink: 0;
}

details.section[open] > summary .section-arrow {
  transform: rotate(90deg);
}

.section-title {
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--espresso);
  flex: 1;
}

.section-progress {
  font-size: 0.75rem;
  color: var(--walnut);
  white-space: nowrap;
  font-weight: 600;
}

.section-bar {
  width: 60px;
  height: 5px;
  background: var(--wood-100);
  border-radius: 3px;
  overflow: hidden;
  flex-shrink: 0;
}

.section-bar-fill {
  height: 100%;
  background: var(--forest-500);
  border-radius: 3px;
  transition: width 0.3s ease;
}

.section-body {
  padding: 0 1rem 1rem;
}

.section-intro {
  font-size: 0.82rem;
  color: var(--walnut);
  font-style: italic;
  margin-bottom: 0.75rem;
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--card-border);
}

/* --- Section Notes --- */
.section-notes-wrap {
  margin-top: 1rem;
  padding-top: 0.75rem;
  border-top: 1px dashed var(--card-border);
}

.section-notes-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--walnut);
  margin-bottom: 0.3rem;
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.section-notes-label::before {
  content: "📝";
  font-size: 0.85rem;
}

.section-notes {
  width: 100%;
  min-height: 70px;
  font-size: 0.82rem;
  font-family: inherit;
  color: var(--ink);
  background: rgba(253,248,240,0.6);
  border: 1px solid var(--card-border);
  border-radius: 6px;
  padding: 0.5rem 0.6rem;
  resize: vertical;
  outline: none;
  line-height: 1.5;
}

.section-notes:focus {
  border-color: var(--copper);
  background: var(--snow);
  box-shadow: 0 0 0 2px rgba(181,106,59,0.1);
}

.section-notes::placeholder {
  color: var(--wood-200);
  font-style: italic;
}

/* --- Section Meta Toggle & Directions Panel --- */
.section-meta-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  font-size: 1rem;
  font-weight: 700;
  line-height: 1;
  color: var(--copper);
  background: transparent;
  border: 1.5px solid var(--copper);
  border-radius: 5px;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s, color 0.15s, transform 0.15s;
  padding: 0;
}

.section-meta-toggle:hover {
  background: var(--copper);
  color: var(--snow);
}

.section-meta-toggle.open {
  background: var(--copper);
  color: var(--snow);
  transform: rotate(45deg);
}

.section-meta {
  display: none;
  margin-bottom: 0.75rem;
  padding: 0.75rem;
  background: rgba(181,106,59,0.05);
  border: 1px solid rgba(181,106,59,0.18);
  border-radius: 8px;
}

.section-meta.visible {
  display: block;
}

.section-meta-field {
  margin-bottom: 0.6rem;
}

.section-meta-field:last-child {
  margin-bottom: 0;
}

.section-meta-field label {
  display: block;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--walnut);
  margin-bottom: 0.2rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.meta-assignee,
.meta-directions,
.meta-link-text,
.meta-link-url {
  width: 100%;
  font-size: 0.82rem;
  font-family: inherit;
  color: var(--ink);
  background: var(--snow);
  border: 1px solid var(--card-border);
  border-radius: 6px;
  padding: 0.4rem 0.5rem;
  outline: none;
}

.meta-assignee:focus,
.meta-directions:focus,
.meta-link-text:focus,
.meta-link-url:focus {
  border-color: var(--copper);
  box-shadow: 0 0 0 2px rgba(181,106,59,0.1);
}

.meta-directions {
  min-height: 60px;
  resize: vertical;
  line-height: 1.5;
}

.meta-link-row {
  display: flex;
  gap: 0.4rem;
  align-items: center;
  flex-wrap: wrap;
}

.meta-link-text {
  flex: 1;
  min-width: 140px;
}

.meta-link-url {
  flex: 1.5;
  min-width: 180px;
}

.meta-link-rendered {
  margin-top: 0.35rem;
  font-size: 0.82rem;
}

.meta-link-rendered a {
  color: var(--copper);
  text-decoration: none;
  font-weight: 600;
  border-bottom: 1px solid rgba(181,106,59,0.3);
  transition: color 0.15s, border-color 0.15s;
}

.meta-link-rendered a:hover {
  color: var(--burn);
  border-bottom-color: var(--burn);
}

/* --- Subsections --- */
.subsection {
  margin-bottom: 0.75rem;
}

.subsection h3 {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--wood-600);
  margin-bottom: 0.4rem;
  padding-top: 0.4rem;
}

/* --- Task Rows --- */
.task {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.4rem 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  flex-wrap: wrap;
}

.task:last-child { border-bottom: none; }

.task.done {
  background: var(--done-bg);
  border-radius: 4px;
}

.task-check {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex: 1;
  min-width: 200px;
  cursor: pointer;
}

.task-check input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--forest-500);
  cursor: pointer;
  flex-shrink: 0;
}

.task-text {
  font-size: 0.82rem;
  color: var(--ink);
}

.task.done .task-text {
  text-decoration: line-through;
  opacity: 0.5;
}

.task-fields {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex-shrink: 0;
}

.field-assignee {
  width: 100px;
  font-size: 0.75rem;
  padding: 0.25rem 0.4rem;
  border: none;
  border-bottom: 1px solid var(--card-border);
  background: transparent;
  color: var(--ink);
  outline: none;
}

.field-assignee:focus {
  border-bottom-color: var(--copper);
}

.link-group {
  display: flex;
  align-items: center;
  gap: 0.2rem;
}

.field-link {
  width: 160px;
  font-size: 0.75rem;
  padding: 0.25rem 0.4rem;
  border: none;
  border-bottom: 1px solid var(--card-border);
  background: transparent;
  color: var(--ink);
  outline: none;
}

.field-link:focus {
  border-bottom-color: var(--copper);
}

.link-out {
  display: none;
  font-size: 0.85rem;
  color: var(--copper);
  text-decoration: none;
  padding: 0.15rem 0.3rem;
  border-radius: 4px;
  line-height: 1;
}

.link-out:hover {
  background: var(--wood-100);
  color: var(--burn);
}

.link-out.visible {
  display: inline-block;
}

footer {
  max-width: 900px;
  margin: 0 auto;
  padding: 1rem 1.5rem;
  font-size: 0.72rem;
  color: var(--walnut);
  text-align: center;
  opacity: 0.7;
}

/* --- Section Wrapper + Green Top Progress Bar --- */
.section-wrap {
  margin-bottom: 0.75rem;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--card-border);
  background: var(--snow);
}

.section-top-bar {
  position: relative;
  height: 22px;
  background: var(--wood-100);
  overflow: hidden;
}

.section-top-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pine), var(--forest-500));
  transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  width: 0%;
  border-radius: 0 3px 3px 0;
}

.section-top-pct {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.68rem;
  font-weight: 700;
  line-height: 1;
  white-space: nowrap;
  transition: left 0.4s cubic-bezier(0.22, 1, 0.36, 1), color 0.2s;
  padding: 0 6px;
}

/* --- Dashboard --- */
#dashboard {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 1.5rem 0.75rem;
}

.dash-grid {
  display: grid;
  grid-template-columns: 1fr 1.6fr 1fr;
  gap: 0.75rem;
}

.dash-card {
  background: var(--snow);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 0.75rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.dash-card h3 {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--walnut);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 0.5rem;
  text-align: center;
}

.dash-card canvas {
  display: block;
  max-width: 100%;
  height: auto;
}

.dash-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem 0.75rem;
  margin-top: 0.5rem;
  justify-content: center;
}

.dash-legend-item {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.65rem;
  color: var(--walnut);
}

.dash-legend-swatch {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* --- Responsive --- */
@media (max-width: 640px) {
  header { padding: 1.25rem 1rem 0.75rem; }
  main { padding: 0.5rem 1rem 2rem; }
  #dashboard { padding: 0 1rem 0.5rem; }
  .dash-grid { grid-template-columns: 1fr; gap: 0.5rem; }
  .dash-card canvas { max-width: 260px; }
  .task { flex-direction: column; align-items: flex-start; gap: 0.3rem; padding: 0.5rem 0; }
  .task-fields { width: 100%; padding-left: 1.6rem; }
  .field-assignee { flex: 1; width: auto; }
  .field-link { flex: 1; width: auto; }
  .section-bar { display: none; }
  .section-top-bar { height: 18px; }
  .section-top-pct { font-size: 0.6rem; }
  .meta-link-row { flex-direction: column; }
  .meta-link-text, .meta-link-url { min-width: 0; width: 100%; }
}

@media (min-width: 641px) and (max-width: 800px) {
  .dash-grid { grid-template-columns: 1fr 1fr; }
  .dash-card:nth-child(2) { grid-column: 1 / -1; }
}
.sync-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  color: var(--walnut);
  padding: 3px 10px;
  background: var(--snow);
  border: 1px solid var(--card-border);
  border-radius: 999px;
}
.sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #999;
  flex-shrink: 0;
}
.sync-dot.connected { background: #3d8b3d; }
.sync-dot.syncing { background: #e8a83e; animation: syncPulse 1s infinite; }
.sync-dot.error { background: #c45e20; }
.sync-dot.offline { background: #999; }
@keyframes syncPulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
</style>
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
</head>
<body>

<header>
  <h1>Simply Nuts &amp; More &mdash; Task Tracker</h1>
  <p class="subtitle">Non-development checklist for launch readiness</p>
  <div class="global-progress">
    <div class="progress-bar"><div class="progress-fill" id="globalFill"></div></div>
    <span class="progress-text" id="globalText">0 / 0 done</span>
  </div>
  <div class="controls">
    <select id="filter">
      <option value="all">All Tasks</option>
      <option value="incomplete">Incomplete</option>
      <option value="complete">Completed</option>
      <option value="has-link">Has Link</option>
      <option value="no-link">Needs Link</option>
    </select>
    <button id="expandAll">Expand All</button>
    <button id="collapseAll">Collapse All</button>
    <button id="exportBtn">Export JSON</button>
    <button id="importBtn">Import JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
    <span class="sync-badge"><span class="sync-dot offline" id="syncDot"></span><span id="syncText">Local only</span></span>
  </div>
</header>

<section id="dashboard">
  <div class="dash-grid">
    <div class="dash-card">
      <h3>Overall Progress</h3>
      <canvas id="chartOverall" width="180" height="180"></canvas>
      <div class="dash-legend" id="legendOverall"></div>
    </div>
    <div class="dash-card">
      <h3>Tasks Done by Section</h3>
      <canvas id="chartSections" width="400" height="180"></canvas>
    </div>
    <div class="dash-card">
      <h3>Completed by Assignee</h3>
      <canvas id="chartAssignees" width="180" height="180"></canvas>
      <div class="dash-legend" id="legendAssignees"></div>
    </div>
  </div>
</section>

<main id="sections"></main>

<footer id="footerInfo"></footer>

// ============================================================
// STATE MANAGEMENT
// ============================================================
const STORAGE_KEY = "snm-task-tracker";

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { version: 1, tasks: {}, collapsed: {}, notes: {}, sectionMeta: {} };
}

function saveState() {
  state.lastModified = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  // Push to Firebase if connected
  if (fbReady && fbDb) {
    updateSyncDot("syncing");
    fbDb.set(state)
      .then(() => updateSyncDot("connected"))
      .catch(() => updateSyncDot("error"));
  }
}

function getTask(id) {
  return state.tasks[id] || { done: false, link: "", assignee: "" };
}

function setTask(id, updates) {
  if (!state.tasks[id]) state.tasks[id] = { done: false, link: "", assignee: "" };
  Object.assign(state.tasks[id], updates);
  saveState();
}

function getNote(sectionId) {
  if (!state.notes) state.notes = {};
  return state.notes[sectionId] || "";
}

function setNote(sectionId, text) {
  if (!state.notes) state.notes = {};
  state.notes[sectionId] = text;
  saveState();
}

function getSectionMeta(sectionId) {
  if (!state.sectionMeta) state.sectionMeta = {};
  return state.sectionMeta[sectionId] || { directions: "", docLink: "", docLinkText: "", assignee: "", open: false };
}

function setSectionMeta(sectionId, updates) {
  if (!state.sectionMeta) state.sectionMeta = {};
  if (!state.sectionMeta[sectionId]) state.sectionMeta[sectionId] = { directions: "", docLink: "", docLinkText: "", assignee: "", open: false };
  Object.assign(state.sectionMeta[sectionId], updates);
  saveState();
}

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB0-Tlq2Fl_MElU8bAFq6q0REj0dSZlfC4",
  authDomain: "simply-nuts-task-tracker.firebaseapp.com",

  projectId: "simply-nuts-task-tracker",
  storageBucket: "simply-nuts-task-tracker.firebasestorage.app",
  messagingSenderId: "606880758461",
  appId: "1:606880758461:web:205f28b94a572a62c095d4"
};
let fbDb = null;
let fbReady = false;

function updateSyncDot(status) {
  const dot = document.getElementById("syncDot");
  const txt = document.getElementById("syncText");
  if (!dot || !txt) return;
  dot.className = "sync-dot " + status;
  const labels = { connected: "Synced", syncing: "Syncing\u2026", error: "Sync error", offline: "Local only" };
  txt.textContent = labels[status] || status;
}

function initFirebase() {
  if (typeof firebase === "undefined") { updateSyncDot("offline"); return; }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    fbDb = firebase.database().ref("tracker");
    updateSyncDot("syncing");

    // Listen for remote changes — fires once on connect, then on every update
    fbDb.on("value", snap => {
      const remote = snap.val();
      if (!remote) {
        // First device ever — push local state to cloud
        fbDb.set(state);
        fbReady = true;
        updateSyncDot("connected");
        return;
      }
      // Ensure all keys exist (backwards compat)
      remote.tasks = remote.tasks || {};
      remote.collapsed = remote.collapsed || {};
      remote.notes = remote.notes || {};
      remote.sectionMeta = remote.sectionMeta || {};
      if (!remote.version) remote.version = 1;

      // Accept remote data only if it's strictly newer than ours
      if (!state.lastModified || (remote.lastModified && remote.lastModified > state.lastModified)) {
        state = remote;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        renderAll();
        updateAllProgress();
      }
      fbReady = true;
      updateSyncDot("connected");
    });

    // Monitor connection state
    firebase.database().ref(".info/connected").on("value", snap => {
      if (fbReady) updateSyncDot(snap.val() ? "connected" : "offline");
    });
  } catch(e) {
    console.warn("Firebase sync unavailable:", e);
    updateSyncDot("offline");
  }
}

// ============================================================
// COUNTING
// ============================================================
function countAll() {
  let total = 0, done = 0;
  SECTIONS.forEach(s => s.subsections.forEach(sub => sub.tasks.forEach(t => {
    total++;
    if (getTask(t.id).done) done++;
  })));
  return { total, done };
}

function countSection(sectionId) {
  const sec = SECTIONS.find(s => s.id === sectionId);
  if (!sec) return { total: 0, done: 0 };
  let total = 0, done = 0;
  sec.subsections.forEach(sub => sub.tasks.forEach(t => {
    total++;
    if (getTask(t.id).done) done++;
  }));
  return { total, done };
}

// RENDERING
// ============================================================
function renderAll() {
  const container = document.getElementById("sections");
  container.innerHTML = SECTIONS.map(renderSection).join("");
  updateAllProgress();
  restoreCollapse();
}

function renderSection(section) {
  const isOpen = !state.collapsed[section.id];
  const meta = getSectionMeta(section.id);
  const hasMetaLink = meta.docLink && meta.docLink.trim() && meta.docLinkText && meta.docLinkText.trim();
  return `
    <div class="section-wrap" data-wrap="${section.id}">
      <div class="section-top-bar">
        <div class="section-top-fill" data-topfill="${section.id}"></div>
        <span class="section-top-pct" data-toppct="${section.id}">0%</span>
      </div>
      <details class="section" data-section="${section.id}" ${isOpen ? "open" : ""}>
        <summary>
          <button class="section-meta-toggle ${meta.open ? "open" : ""}" data-meta-toggle="${section.id}" title="Section directions &amp; details">+</button>
          <span class="section-arrow"></span>
          <span class="section-title">${section.title}</span>
          <span class="section-progress" data-progress="${section.id}"></span>
          <div class="section-bar"><div class="section-bar-fill" data-bar="${section.id}"></div></div>
        </summary>
        <div class="section-body">
          <div class="section-meta ${meta.open ? "visible" : ""}" data-meta="${section.id}">
            <div class="section-meta-field">
              <label>Section Assignee</label>
              <input type="text" class="meta-assignee" data-meta-assignee="${section.id}" placeholder="Assign someone to this entire section\u2026" value="${escHtml(meta.assignee)}" />
            </div>
            <div class="section-meta-field">
              <label>Directions</label>
              <textarea class="meta-directions" data-meta-directions="${section.id}" placeholder="Add directions or instructions for this section\u2026">${escHtml(meta.directions)}</textarea>
            </div>
            <div class="section-meta-field">
              <label>Section Document</label>
              <div class="meta-link-row">
                <input type="text" class="meta-link-text" data-meta-link-text="${section.id}" placeholder="Display text (e.g. Project Brief)" value="${escHtml(meta.docLinkText)}" />
                <input type="url" class="meta-link-url" data-meta-link-url="${section.id}" placeholder="Paste document URL\u2026" value="${escHtml(meta.docLink)}" />
              </div>
              ${hasMetaLink ? `<div class="meta-link-rendered"><a href="${escHtml(meta.docLink)}" target="_blank" rel="noopener">${escHtml(meta.docLinkText)} \u2197</a></div>` : ""}
            </div>
          </div>
          ${section.intro ? `<p class="section-intro">${section.intro}</p>` : ""}
          ${section.subsections.map(sub => renderSubsection(sub)).join("")}
          <div class="section-notes-wrap">
            <div class="section-notes-label">Notes &amp; Additional Info</div>
            <textarea class="section-notes" data-notes="${section.id}" placeholder="Add notes, reminders, or essential details for this section\u2026">${escHtml(getNote(section.id))}</textarea>
          </div>
        </div>
      </details>
    </div>`;
}

function renderSubsection(sub) {
  return `
    <div class="subsection">
      ${sub.title ? `<h3>${sub.title}</h3>` : ""}
      <div class="task-list">
        ${sub.tasks.map(t => renderTask(t)).join("")}
      </div>
    </div>`;
}

function renderTask(t) {
  const s = getTask(t.id);
  const hasLink = s.link && s.link.trim().length > 0;
  return `
    <div class="task ${s.done ? "done" : ""}" data-id="${t.id}">
      <label class="task-check">
        <input type="checkbox" ${s.done ? "checked" : ""} />
        <span class="task-text">${t.text}</span>
      </label>
      <div class="task-fields">
        <input type="text" class="field-assignee" placeholder="Assignee" value="${escHtml(s.assignee)}" />
        <div class="link-group">
          <input type="url" class="field-link" placeholder="Paste link\u2026" value="${escHtml(s.link)}" />
          <a class="link-out ${hasLink ? "visible" : ""}" href="${hasLink ? escHtml(s.link) : "#"}" target="_blank" rel="noopener" title="Open link">\u2197</a>
        </div>
      </div>
    </div>`;
}

function escHtml(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ============================================================
// PROGRESS UPDATES
// ============================================================
function updateAllProgress() {
  const g = countAll();
  document.getElementById("globalFill").style.width = g.total ? (g.done/g.total*100)+"%":"0%";
  document.getElementById("globalText").textContent = `${g.done} / ${g.total} done`;

  SECTIONS.forEach(sec => {
    const c = countSection(sec.id);
    const pct = c.total ? Math.round(c.done/c.total*100) : 0;
    const progEl = document.querySelector(`[data-progress="${sec.id}"]`);
    const barEl = document.querySelector(`[data-bar="${sec.id}"]`);
    if (progEl) progEl.textContent = `${c.done} / ${c.total}`;
    if (barEl) barEl.style.width = c.total ? pct+"%":"0%";

    // Green top bar
    const topFill = document.querySelector(`[data-topfill="${sec.id}"]`);
    const topPct = document.querySelector(`[data-toppct="${sec.id}"]`);
    if (topFill) topFill.style.width = pct + "%";
    if (topPct) {
      topPct.textContent = pct + "%";
      // Position % label at right edge of fill, but clamp to stay visible
      if (pct < 12) {
        topPct.style.left = pct + "%";
        topPct.style.color = "var(--pine)";
      } else {
        topPct.style.left = (pct - 1) + "%";
        topPct.style.color = "#fff";
        topPct.style.textAlign = "right";
        topPct.style.transform = "translateX(-100%) translateY(-50%)";
      }
      if (pct === 0) {
        topPct.style.left = "4px";
        topPct.style.transform = "translateY(-50%)";
        topPct.style.color = "var(--wood-200)";
      }
    }
  });

  updateDashboard();
  updateFooter();
}

function updateFooter() {
  const foot = document.getElementById("footerInfo");
  const bytes = new Blob([localStorage.getItem(STORAGE_KEY)||""]).size;
  const kb = (bytes/1024).toFixed(1);
  const mod = state.lastModified ? new Date(state.lastModified).toLocaleString() : "never";
  foot.textContent = `Last saved: ${mod} \u00b7 Storage: ${kb} KB`;
}

// ============================================================
// COLLAPSE STATE
// ============================================================
function restoreCollapse() {
  document.querySelectorAll("details.section").forEach(el => {
    const sid = el.dataset.section;
    if (state.collapsed[sid]) el.removeAttribute("open");
    else el.setAttribute("open","");
  });
}

// ============================================================
// EVENT HANDLERS
// ============================================================
const debouncers = {};
function debounce(key, fn, ms) {
  clearTimeout(debouncers[key]);
  debouncers[key] = setTimeout(fn, ms);
}

document.addEventListener("DOMContentLoaded", () => {
  renderAll();

  const main = document.getElementById("sections");

  // Checkbox changes
  main.addEventListener("change", (e) => {
    if (e.target.type !== "checkbox") return;
    const row = e.target.closest(".task");
    if (!row) return;
    const id = row.dataset.id;
    const checked = e.target.checked;
    setTask(id, { done: checked });
    row.classList.toggle("done", checked);
    row.querySelector(".task-text").style.textDecoration = checked ? "line-through" : "none";
    row.querySelector(".task-text").style.opacity = checked ? "0.5" : "1";
    updateAllProgress();
  });

  // Section meta toggle ("+" button) — must prevent <details> from toggling
  main.addEventListener("click", (e) => {
    const btn = e.target.closest(".section-meta-toggle");
    if (!btn) return;
    e.stopPropagation();
    e.preventDefault();
    const sid = btn.dataset.metaToggle;
    const panel = main.querySelector(`.section-meta[data-meta="${sid}"]`);
    const isOpen = panel.classList.toggle("visible");
    btn.classList.toggle("open", isOpen);
    setSectionMeta(sid, { open: isOpen });
  });

  // Section meta fields (debounced) + Section notes (debounced) + task fields
  main.addEventListener("input", (e) => {
    // Section notes
    if (e.target.classList.contains("section-notes")) {
      const sid = e.target.dataset.notes;
      debounce("note-"+sid, () => setNote(sid, e.target.value), 300);
      return;
    }

    // Section meta: assignee
    if (e.target.classList.contains("meta-assignee")) {
      const sid = e.target.dataset.metaAssignee;
      debounce("meta-assignee-"+sid, () => setSectionMeta(sid, { assignee: e.target.value.trim() }), 300);
      return;
    }

    // Section meta: directions
    if (e.target.classList.contains("meta-directions")) {
      const sid = e.target.dataset.metaDirections;
      debounce("meta-dir-"+sid, () => setSectionMeta(sid, { directions: e.target.value }), 300);
      return;
    }

    // Section meta: doc link text
    if (e.target.classList.contains("meta-link-text")) {
      const sid = e.target.dataset.metaLinkText;
      debounce("meta-lt-"+sid, () => {
        setSectionMeta(sid, { docLinkText: e.target.value.trim() });
        updateMetaLinkPreview(sid);
      }, 300);
      return;
    }

    // Section meta: doc link URL
    if (e.target.classList.contains("meta-link-url")) {
      const sid = e.target.dataset.metaLinkUrl;
      debounce("meta-lu-"+sid, () => {
        setSectionMeta(sid, { docLink: e.target.value.trim() });
        updateMetaLinkPreview(sid);
      }, 300);
      return;
    }

    const row = e.target.closest(".task");
    if (!row) return;
    const id = row.dataset.id;

    if (e.target.classList.contains("field-assignee")) {
      debounce("assign-"+id, () => setTask(id, { assignee: e.target.value.trim() }), 300);
    }
    if (e.target.classList.contains("field-link")) {
      debounce("link-"+id, () => {
        const val = e.target.value.trim();
        setTask(id, { link: val });
        const icon = row.querySelector(".link-out");
        if (val) {
          icon.classList.add("visible");
          icon.href = val;
        } else {
          icon.classList.remove("visible");
          icon.href = "#";
        }
      }, 300);
    }
  });

  // Collapse persistence (toggle doesn't bubble — use capture)
  main.addEventListener("toggle", (e) => {
    if (e.target.tagName === "DETAILS") {
      const sid = e.target.dataset.section;
      state.collapsed[sid] = !e.target.open;
      saveState();
    }
  }, true);

  // Filter
  document.getElementById("filter").addEventListener("change", (e) => {
    applyFilter(e.target.value);
  });

  // Expand/Collapse All
  document.getElementById("expandAll").addEventListener("click", () => {
    document.querySelectorAll("details.section").forEach(el => { el.open = true; });
    SECTIONS.forEach(s => { state.collapsed[s.id] = false; });
    saveState();
  });
  document.getElementById("collapseAll").addEventListener("click", () => {
    document.querySelectorAll("details.section").forEach(el => { el.open = false; });
    SECTIONS.forEach(s => { state.collapsed[s.id] = true; });
    saveState();
  });

  // Export / Import
  document.getElementById("exportBtn").addEventListener("click", exportJSON);
  document.getElementById("importBtn").addEventListener("click", () => {
    document.getElementById("importFile").click();
  });
  document.getElementById("importFile").addEventListener("change", (e) => {
    if (e.target.files[0]) importJSON(e.target.files[0]);
    e.target.value = "";  // reset so same file can be re-imported
  });

  // Start Firebase sync
  initFirebase();
});

// ============================================================
// DASHBOARD CHARTS
// ============================================================
const CHART_COLORS = [
  "#3e5f43","#b56a3b","#6e4023","#3d8b3d","#c45e20",
  "#5b8a72","#d4956b","#8b5529","#2d6b2d","#e8c9a0",
  "#7db892","#a0522d","#4a7c59","#cc7744","#556b2f"
];

function hiDpiCanvas(canvas, w, h) {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  return ctx;
}

function drawPieChart(canvasId, legendId, slices) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const size = 180;
  const ctx = hiDpiCanvas(canvas, size, size);
  const cx = size / 2, cy = size / 2, r = 70;
  const total = slices.reduce((a, s) => a + s.value, 0);

  ctx.clearRect(0, 0, size, size);

  if (total === 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = "#e8d9c7";
    ctx.fill();
    ctx.fillStyle = "#6e4023";
    ctx.font = "600 11px -apple-system, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("No data", cx, cy);

    const legend = document.getElementById(legendId);
    if (legend) legend.innerHTML = "";
    return;
  }

  let startAngle = -Math.PI / 2;
  slices.forEach((slice, i) => {
    if (slice.value === 0) return;
    const sliceAngle = (slice.value / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, startAngle + sliceAngle);
    ctx.closePath();
    ctx.fillStyle = slice.color || CHART_COLORS[i % CHART_COLORS.length];
    ctx.fill();

    // Label inside slice if big enough
    if (slice.value / total > 0.08) {
      const midAngle = startAngle + sliceAngle / 2;
      const lx = cx + Math.cos(midAngle) * (r * 0.6);
      const ly = cy + Math.sin(midAngle) * (r * 0.6);
      const pctVal = Math.round(slice.value / total * 100);
      ctx.fillStyle = "#fff";
      ctx.font = "700 11px -apple-system, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(pctVal + "%", lx, ly);
    }

    startAngle += sliceAngle;
  });

  // Center hole for donut effect
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.42, 0, Math.PI * 2);
  ctx.fillStyle = "#fffdfa";
  ctx.fill();

  // Center text
  const donePct = total > 0 ? slices[0].value : 0;
  ctx.fillStyle = "#24160f";
  ctx.font = "700 18px -apple-system, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  if (canvasId === "chartOverall") {
    const g = countAll();
    const oPct = g.total ? Math.round(g.done / g.total * 100) : 0;
    ctx.fillText(oPct + "%", cx, cy - 4);
    ctx.font = "500 9px -apple-system, sans-serif";
    ctx.fillStyle = "#6e4023";
    ctx.fillText("complete", cx, cy + 12);
  }

  // Legend
  const legend = document.getElementById(legendId);
  if (legend) {
    legend.innerHTML = slices
      .filter(s => s.value > 0)
      .map((s, i) => `<span class="dash-legend-item"><span class="dash-legend-swatch" style="background:${s.color || CHART_COLORS[i % CHART_COLORS.length]}"></span>${s.label} (${s.value})</span>`)
      .join("");
  }
}

function drawBarChart(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const w = 400, h = 180;
  const ctx = hiDpiCanvas(canvas, w, h);
  ctx.clearRect(0, 0, w, h);

  const padL = 28, padR = 10, padT = 10, padB = 30;
  const chartW = w - padL - padR;
  const chartH = h - padT - padB;
  const barGap = 4;
  const barW = Math.floor((chartW - barGap * (SECTIONS.length - 1)) / SECTIONS.length);

  // Get max
  let maxVal = 0;
  const data = SECTIONS.map(sec => {
    const c = countSection(sec.id);
    if (c.total > maxVal) maxVal = c.total;
    return c;
  });
  if (maxVal === 0) maxVal = 1;

  // Y-axis gridlines
  ctx.strokeStyle = "#e8d9c7";
  ctx.lineWidth = 0.5;
  ctx.fillStyle = "#6e4023";
  ctx.font = "500 9px -apple-system, sans-serif";
  ctx.textAlign = "right";
  ctx.textBaseline = "middle";
  for (let i = 0; i <= 4; i++) {
    const y = padT + chartH - (i / 4) * chartH;
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(w - padR, y);
    ctx.stroke();
    ctx.fillText(Math.round(maxVal * i / 4), padL - 4, y);
  }

  // Bars
  SECTIONS.forEach((sec, i) => {
    const c = data[i];
    const x = padL + i * (barW + barGap);
    const totalH = c.total ? (c.total / maxVal) * chartH : 0;
    const doneH = c.total ? (c.done / maxVal) * chartH : 0;

    // Total bar (background)
    ctx.fillStyle = "#e8d9c7";
    ctx.beginPath();
    ctx.roundRect(x, padT + chartH - totalH, barW, totalH, [3, 3, 0, 0]);
    ctx.fill();

    // Done bar (foreground)
    if (c.done > 0) {
      ctx.fillStyle = CHART_COLORS[i % CHART_COLORS.length];
      ctx.beginPath();
      ctx.roundRect(x, padT + chartH - doneH, barW, doneH, [3, 3, 0, 0]);
      ctx.fill();
    }

    // Done count on top of bar
    if (c.done > 0) {
      ctx.fillStyle = "#24160f";
      ctx.font = "700 8px -apple-system, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      ctx.fillText(c.done, x + barW / 2, padT + chartH - doneH - 2);
    }

    // Label below
    ctx.fillStyle = "#6e4023";
    ctx.font = "600 9px -apple-system, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    ctx.fillText(sec.id, x + barW / 2, padT + chartH + 6);

    // Total below label
    ctx.font = "400 7px -apple-system, sans-serif";
    ctx.fillStyle = "#b56a3b";
    ctx.fillText("/" + c.total, x + barW / 2, padT + chartH + 18);
  });
}

function collectAssigneeStats() {
  const map = {};
  SECTIONS.forEach(sec => sec.subsections.forEach(sub => sub.tasks.forEach(t => {
    const s = getTask(t.id);
    if (s.done && s.assignee && s.assignee.trim()) {
      const name = s.assignee.trim();
      map[name] = (map[name] || 0) + 1;
    }
  })));
  return Object.entries(map)
    .sort((a, b) => b[1] - a[1])
    .map(([label, value], i) => ({
      label,
      value,
      color: CHART_COLORS[i % CHART_COLORS.length]
    }));
}

function updateDashboard() {
  const g = countAll();

  // Pie 1: Overall finished vs unfinished
  drawPieChart("chartOverall", "legendOverall", [
    { label: "Finished", value: g.done, color: "#3d8b3d" },
    { label: "Remaining", value: g.total - g.done, color: "#f5e6d0" }
  ]);

  // Bar chart: per-section
  drawBarChart("chartSections");

  // Pie 2: Assignees
  const assigneeSlices = collectAssigneeStats();
  if (assigneeSlices.length === 0) {
    // Show empty state
    drawPieChart("chartAssignees", "legendAssignees", [
      { label: "Unassigned", value: 1, color: "#e8d9c7" }
    ]);
  } else {
    drawPieChart("chartAssignees", "legendAssignees", assigneeSlices);
  }
}

// ============================================================
// META LINK PREVIEW
// ============================================================
function updateMetaLinkPreview(sid) {
  const meta = getSectionMeta(sid);
  const panel = document.querySelector(`.section-meta[data-meta="${sid}"]`);
  if (!panel) return;
  const existing = panel.querySelector(".meta-link-rendered");
  if (meta.docLink && meta.docLink.trim() && meta.docLinkText && meta.docLinkText.trim()) {
    if (existing) {
      existing.innerHTML = `<a href="${escHtml(meta.docLink)}" target="_blank" rel="noopener">${escHtml(meta.docLinkText)} \u2197</a>`;
    } else {
      const div = document.createElement("div");
      div.className = "meta-link-rendered";
      div.innerHTML = `<a href="${escHtml(meta.docLink)}" target="_blank" rel="noopener">${escHtml(meta.docLinkText)} \u2197</a>`;
      const linkField = panel.querySelectorAll(".section-meta-field")[2];
      if (linkField) linkField.appendChild(div);
    }
  } else if (existing) {
    existing.remove();
  }
}

// ============================================================
// FILTER
// ============================================================
function applyFilter(value) {
  document.querySelectorAll(".task").forEach(row => {
    const id = row.dataset.id;
    const s = getTask(id);
    let show = true;
    if (value === "incomplete") show = !s.done;
    if (value === "complete") show = s.done;
    if (value === "has-link") show = !!(s.link && s.link.trim());
    if (value === "no-link") show = !(s.link && s.link.trim());
    row.style.display = show ? "" : "none";
  });
}

// ============================================================
// IMPORT / EXPORT
// ============================================================
function importJSON(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.tasks) throw new Error("Invalid format — no tasks found");
      imported.version = imported.version || 1;
      imported.collapsed = imported.collapsed || {};
      imported.notes = imported.notes || {};
      imported.sectionMeta = imported.sectionMeta || {};
      imported.lastModified = new Date().toISOString();
      state = imported;
      saveState();
      renderAll();
      updateAllProgress();
      alert("Import successful! " + Object.keys(state.tasks).length + " task states loaded.");
    } catch(err) {
      alert("Import failed: " + err.message);
    }
  };
  reader.readAsText(file);
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `snm-tasks-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
